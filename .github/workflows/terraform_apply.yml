name: Terraform Apply

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest

    env:
      TF_VAR_region: ap-southeast-2
      TF_VAR_vpc_id: ${{ secrets.TF_VAR_vpc_id }}
      TF_VAR_public_subnets: '["subnet-0231cc910a84a9e6f","subnet-025d7e1fc3f3fdcee","subnet-020b0f3325ef68ff3"]'
      TF_VAR_private_subnets: '["subnet-041849406847b77b1","subnet-0e15c1b2ed19abc66"]'
      TF_VAR_ecs_security_group: ${{ secrets.TF_VAR_ecs_security_group }}
      TF_VAR_alb_security_group: ${{ secrets.TF_VAR_alb_security_group }}
      TF_VAR_api_image: ${{ secrets.TF_VAR_api_image }}
      TF_VAR_broker_image: ${{ secrets.TF_VAR_broker_image }}
      TF_VAR_dashboard_image: ${{ secrets.TF_VAR_dashboard_image }}
      TF_VAR_db_url_secret_arn: ${{ secrets.TF_VAR_db_url_secret_arn }}
      TF_VAR_create_secrets: ${{ secrets.TF_VAR_create_secrets }}
      TF_VAR_db_username: ${{ secrets.TF_VAR_db_username }}
      TF_VAR_db_password: ${{ secrets.TF_VAR_db_password }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: trading-app
          IMAGE_TAG: latest
        run: |
          IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: AWS identity
        run: aws sts get-caller-identity

      - name: Terraform Init
        run: terraform -chdir=infra/terraform init -reconfigure

      - name: Import existing resources
        run: |
          terraform -chdir=infra/terraform import 'module.ecs.aws_lb.alb' 'arn:aws:elasticloadbalancing:ap-southeast-2:156876768682:loadbalancer/app/gbpusd-signal-alb/f786febcb9a6676a' || true
          terraform -chdir=infra/terraform import 'module.ecs.aws_lb_target_group.api' 'arn:aws:elasticloadbalancing:ap-southeast-2:156876768682:targetgroup/gbpusd-signal-api-tg/d1734ae2bdb20dd4' || true
          terraform -chdir=infra/terraform import 'module.ecs.aws_lb_target_group.dashboard' 'arn:aws:elasticloadbalancing:ap-southeast-2:156876768682:targetgroup/gbpusd-signal-dash-tg/7dd9fc45ee1d3aaf' || true
          terraform -chdir=infra/terraform import 'module.rds.aws_security_group.db' 'sg-0edcf1c82d8a1d8dd' || true
          terraform -chdir=infra/terraform import 'module.s3.aws_s3_bucket.data_lake' 'gbpusd-signal-data' || true
          terraform -chdir=infra/terraform import 'module.ecs.aws_iam_role.task_execution' 'gbpusd-signal-ecsTaskExecutionRole' || true
          terraform -chdir=infra/terraform import 'module.ecs.aws_iam_role.task' 'gbpusd-signal-taskRole' || true
          terraform -chdir=infra/terraform import 'module.ecs.aws_iam_role.events' 'gbpusd-signal-eventsRole' || true
          terraform -chdir=infra/terraform import 'module.ecs.aws_cloudwatch_log_group.api' '/ecs/gbpusd-signal/api' || true
          terraform -chdir=infra/terraform import 'module.ecs.aws_cloudwatch_log_group.dashboard' '/ecs/gbpusd-signal/dashboard' || true
          terraform -chdir=infra/terraform import 'module.ecs.aws_cloudwatch_log_group.runner' '/ecs/gbpusd-signal/runner' || true
          terraform -chdir=infra/terraform import 'module.rds.aws_db_subnet_group.this' 'gbpusd-signal-db-subnets' || true
          terraform -chdir=infra/terraform import 'module.ecs.aws_ecs_service.api' 'gbpusd-signal-cluster/gbpusd-signal-api-svc' || true
          terraform -chdir=infra/terraform import 'module.ecs.aws_ecs_service.dashboard' 'gbpusd-signal-cluster/gbpusd-signal-dashboard-svc' || true
          terraform -chdir=infra/terraform import 'module.rds.aws_db_instance.postgres' 'gbpusd-signal-db' || true
          
      - name: Terraform Validate
        run: terraform -chdir=infra/terraform validate

      - name: Terraform Plan
        env:
          TF_VAR_api_image: ${{ steps.build-image.outputs.image_uri }}
          TF_VAR_dashboard_image: ${{ steps.build-image.outputs.image_uri }}
        run: terraform -chdir=infra/terraform plan -no-color -input=false

      - name: Terraform Apply
        run: terraform -chdir=infra/terraform apply -auto-approve -input=false

      - name: Terraform Outputs
        run: terraform -chdir=infra/terraform output || true
